name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

env:
  SKIP_DEPLOY: ${{ !contains(join(github.event.commits.*.message, ' '), '#skip') }}

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: lint
        run: npm run eslint
      - name: build
        run: npm run build
      - name: test
        run: npm run test
      - name: Deploy to production
        if: ${{ github.event_name == 'push' && env.SKIP_DEPLOY == 'true' }}
        uses: johnbeynon/render-deploy-action@a0588f9aca995a15d69a72cb2bfbf37c12e5b540
        with:
          service-id: ${{ secrets.MY_RENDER_SERVICE_ID }}
          api-key: ${{ secrets.MY_RENDER_API_KEY }}
          wait-for-success: true
      - name: Deploy notification
        if: ${{ github.event_name == 'push' && env.SKIP_DEPLOY == 'true' }}
        uses: rjstone/discord-webhook-notify@v2.2.1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          username: Fullstack part 11 Hook
          text: "A new version of Pokedex deployed!"
          severity: info # only to make sure the embed is added
          color: '#00ff00'
          title: My Fancy Embed Title
          description: "to [https://full-stack-open-pokedex-dpas.onrender.com/](https://full-stack-open-pokedex-dpas.onrender.com/) by ${{ github.actor }}"
          # details: not needed because we overrode default description.
          footer: "Severity: Informational - Today at ${{ github.event.head_commit.timestamp }}"
      - name: Failed build notification
        if: ${{ failure() }}
        uses: rjstone/discord-webhook-notify@v2.2.1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          username: Fullstack part 11 Hook
          text: "Build failed!"
          severity: info # only to make sure the embed is added
          color: '#ff0000'
          title: My Fancy Embed Title
          description: "to [https://full-stack-open-pokedex-dpas.onrender.com/](https://full-stack-open-pokedex-dpas.onrender.com/) by ${{ github.actor }}"
          # details: not needed because we overrode default description.
          footer: "Severity: Failure - Today at ${{ github.event.head_commit.timestamp }}"
  tag_release:
    needs: [simple_deployment_pipeline]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump version and push tag
        if: ${{ github.event_name == 'push' && env.SKIP_DEPLOY == 'true' }}
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
